name: 部署山林獵人到主機

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 SSH 金鑰
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 142.93.3.132 >> ~/.ssh/known_hosts

      - name: 上傳前端 HTML
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hunter-truku-v2.html \
            root@142.93.3.132:/var/www/hunter/public/index.html
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            public/admin.html \
            root@142.93.3.132:/var/www/hunter/public/admin.html

      - name: 上傳詞彙圖片
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@142.93.3.132 \
            "mkdir -p /var/www/hunter/public/images"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            public/images/*.png \
            root@142.93.3.132:/var/www/hunter/public/images/

      - name: 上傳後端檔案
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            backend/server.js backend/package.json \
            root@142.93.3.132:/var/www/hunter/backend/

      - name: 安裝依賴並重啟 API
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@142.93.3.132 "
            cd /var/www/hunter/backend
            npm install --production --silent
            mkdir -p /var/www/hunter/public/images
            if pm2 list | grep -q hunter-api; then
              pm2 restart hunter-api
            else
              pm2 start server.js --name hunter-api --log /var/log/hunter/api.log
              pm2 save
            fi
            echo 'API restarted OK'
          "

      - name: 確認部署成功
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@142.93.3.132 \
            "pm2 list | grep hunter-api && curl -s http://127.0.0.1:3000/api/health"
