name: 部署山林獵人到主機

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 SSH 金鑰
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 142.93.3.132 >> ~/.ssh/known_hosts

      - name: 上傳 HTML 到主機
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            hunter-truku-v2.html \
            root@142.93.3.132:/var/www/hunter/public/index.html

      - name: 確認部署成功
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            root@142.93.3.132 \
            "echo '✅ 部署完成：' && ls -lh /var/www/hunter/public/"
